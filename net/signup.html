<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="signup-bg">
  <div class="overlay"></div>
  <div class="auth-container">
    <div class="logo">NETFLIX</div>
    <h2>Sign Up</h2>
    <form id="signupForm">
      <input id="signupUsername" type="text" placeholder="Username" required>
      <input id="signupEmail" type="email" placeholder="Email" required>
      <input id="signupPassword" type="password" placeholder="Password" required>
      <button type="submit" class="btn-red">Sign Up</button>
    </form>
    <p class="auth-text">Already have an account? <a href="index.html">Login</a></p>
  </div>
  <script src="auth.js"></script>
</body>
</html>
